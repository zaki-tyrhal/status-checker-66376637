name: crous-monitor

on:
  schedule:
    # Toutes les 15 min (minimum fiable sur GitHub ; "*/5" possible mais souvent retardé)
    - cron: "*/15 * * * *"
  workflow_dispatch:       # bouton "Run workflow" pour tester à la main

# Évite que deux exécutions se chevauchent
concurrency:
  group: crous-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Vérifier les nouvelles annonces Crous
        env:
          CROUS_RUN_ONCE: "1"
          # Canaux locaux désactivés (pas d'écran sur le serveur GitHub)
          CROUS_DESKTOP_ENABLED: "0"
          CROUS_SOUND_ENABLED: "0"
          CROUS_OPEN_BROWSER: "0"
          # Secrets (définis dans Settings -> Secrets and variables -> Actions)
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: python crous-monitor.py